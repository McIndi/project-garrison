services:
  valkey:
    image: docker.io/valkey/valkey:latest
    command:
      - valkey-server
      - --requirepass
      - ${VALKEY_PASSWORD:-rootpass}
    ports:
      - "6379:6379"
    networks:
      - data-net

  mongo:
    image: docker.io/library/mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpass}
    ports:
      - "27017:27017"
    networks:
      - data-net

  vault:
    image: docker.io/hashicorp/vault:1.17
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-http://127.0.0.1:8200}
      VAULT_LOCAL_TLS: ${GARRISON_VAULT_TLS:-false}
      VAULT_CACERT: /vault/tls/vault-ca.pem
    cap_add:
      - IPC_LOCK
    command:
      - /bin/sh
      - -ec
      - |
        if [ "$${VAULT_LOCAL_TLS}" = "true" ]; then
          exec vault server -config=/vault/config/vault-tls.hcl
        fi
        exec vault server -config=/vault/config/vault.hcl
    volumes:
      - ./config/vault/vault.hcl:/vault/config/vault.hcl:ro,Z
      - ./config/vault/vault-tls.hcl:/vault/config/vault-tls.hcl:ro,Z
      - ./logs/vault/tls:/vault/tls:ro,Z
      - vault-audit-logs:/vault/logs:U
      - vault-data:/vault/data:U
    ports:
      - "8200:8200"
    networks:
      - agent-net
      - data-net

  beeai-runtime:
    build:
      context: ./beeai-runtime
    environment:
      BEEAI_API_KEY: ${BEEAI_API_KEY:-demo}
    networks:
      - data-net

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./logs/nginx:/var/log/nginx:U,Z
    ports:
      - "8088:8088"
    networks:
      - data-net

  fluent-bit:
    image: docker.io/fluent/fluent-bit:3.1
    environment:
      AUDIT_INGEST_TOKEN: ${TOOL_SERVER_AUDIT_INGEST_TOKEN:-}
    volumes:
      - ./config/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro,Z
      - vault-audit-logs:/logs/vault:ro
      - ./logs/nginx:/logs/nginx:ro,Z
    depends_on:
      - vault
      - nginx
      - tool-server
    networks:
      - data-net

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro,Z
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - data-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    networks:
      - agent-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      WEBUI_AUTH: "True"
      GARRISON_ORCHESTRATE_ENABLED: "true"
      GARRISON_ORCHESTRATE_URL: http://tool-server:8080/orchestrate
      GARRISON_ORCHESTRATE_BEARER_TOKEN: ${GARRISON_ORCHESTRATE_BEARER_TOKEN:-}
      GARRISON_ORCHESTRATE_AGENT_ID: agent-root
      GARRISON_ORCHESTRATE_AGENT_CLASS: orchestrator
      GARRISON_ORCHESTRATE_ROOT_ID: agent-root
      GARRISON_ORCHESTRATE_DEFAULT_CLASS: rag
      GARRISON_ORCHESTRATE_REQUIRED_ROLES: garrison-orchestrator
      GARRISON_ORCHESTRATE_REQUIRED_GROUPS: garrison-orchestrators
      GARRISON_ORCHESTRATE_AUTHZ_MODE: any
      GARRISON_ORCHESTRATE_REQUIRE_USER_CLAIMS: "true"
      GARRISON_OIDC_REQUIRED_ISSUER: http://keycloak:8080/realms/garrison
      GARRISON_OIDC_REQUIRED_AUDIENCE: open-webui
      GARRISON_OIDC_REQUIRE_EXP: "true"
      GARRISON_OIDC_CLOCK_SKEW_SECONDS: "60"
    volumes:
      - ./open-webui/pipelines:/app/pipelines:ro
    ports:
      - "3000:8080"
    networks:
      - agent-net

  tool-server:
    build:
      context: ./tool-server
    environment:
      TOOL_SERVER_BEEAI_URL: http://beeai-runtime:8090
      TOOL_SERVER_VALKEY_URL: redis://:${VALKEY_PASSWORD:-rootpass}@valkey:6379/0
      TOOL_SERVER_MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-rootpass}@mongo:27017
      TOOL_SERVER_VAULT_ADDR: ${TOOL_SERVER_VAULT_ADDR:-http://vault:8200}
      TOOL_SERVER_VAULT_CACERT: ${TOOL_SERVER_VAULT_CACERT:-}
      TOOL_SERVER_VAULT_SKIP_VERIFY: ${TOOL_SERVER_VAULT_SKIP_VERIFY:-false}
      TOOL_SERVER_VAULT_TOKEN: ${TOOL_SERVER_VAULT_TOKEN:-}
      TOOL_SERVER_REQUIRE_TOKEN_LOOKUP: "true"
      TOOL_SERVER_ENFORCE_TOKEN_IDENTITY_BINDING: "true"
      TOOL_SERVER_REQUIRE_TOKEN_METADATA_CONTRACT: "true"
      TOOL_SERVER_ALLOW_HEADER_IDENTITY_FALLBACK: "false"
      TOOL_SERVER_ALLOW_ROOT_TOKEN_FALLBACK: "false"
      TOOL_SERVER_SPAWN_MAX_DEPTH: "2"
      TOOL_SERVER_FETCH_PROXY_URL: http://nginx:8088
      TOOL_SERVER_FETCH_REQUIRE_PROXY: "true"
      TOOL_SERVER_AUDIT_INGEST_TOKEN: ${TOOL_SERVER_AUDIT_INGEST_TOKEN:-}
    volumes:
      - ./logs/vault/tls:/app/certs/vault:ro,Z
    depends_on:
      - valkey
      - beeai-runtime
      - vault
      - otel-collector
      - nginx
    ports:
      - "8080:8080"
    networks:
      - agent-net
      - data-net

networks:
  agent-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  vault-audit-logs:
  vault-data:
