services:
  valkey:
    image: docker.io/valkey/valkey:latest
    command:
      - valkey-server
      - --requirepass
      - rootpass
    ports:
      - "6379:6379"
    networks:
      - data-net

  mongo:
    image: docker.io/library/mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    ports:
      - "27017:27017"
    networks:
      - data-net

  vault:
    image: docker.io/hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev -dev-root-token-id=root
    volumes:
      - vault-audit-logs:/vault/logs:U
    ports:
      - "8200:8200"
    networks:
      - agent-net
      - data-net

  beeai-runtime:
    build:
      context: ./beeai-runtime
    environment:
      BEEAI_API_KEY: demo
    networks:
      - data-net

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./logs/nginx:/var/log/nginx:Z
    ports:
      - "8088:8088"
    networks:
      - data-net

  fluent-bit:
    image: docker.io/fluent/fluent-bit:3.1
    volumes:
      - ./config/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro,Z
      - vault-audit-logs:/logs/vault:ro
      - ./logs/nginx:/logs/nginx:ro,Z
    depends_on:
      - vault
      - nginx
      - tool-server
    networks:
      - data-net

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro,Z
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - data-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - agent-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      WEBUI_AUTH: "True"
      GARRISON_ORCHESTRATE_ENABLED: "true"
      GARRISON_ORCHESTRATE_URL: http://tool-server:8080/orchestrate
      GARRISON_ORCHESTRATE_BEARER_TOKEN: root
      GARRISON_ORCHESTRATE_AGENT_ID: agent-root
      GARRISON_ORCHESTRATE_AGENT_CLASS: orchestrator
      GARRISON_ORCHESTRATE_ROOT_ID: agent-root
      GARRISON_ORCHESTRATE_DEFAULT_CLASS: rag
    volumes:
      - ./open-webui/pipelines:/app/pipelines:ro
    ports:
      - "3000:8080"
    networks:
      - agent-net

  tool-server:
    build:
      context: ./tool-server
    environment:
      TOOL_SERVER_BEEAI_URL: http://beeai-runtime:8090
      TOOL_SERVER_VALKEY_URL: redis://:rootpass@valkey:6379/0
      TOOL_SERVER_MONGO_URI: mongodb://root:rootpass@mongo:27017
      TOOL_SERVER_VAULT_ADDR: http://vault:8200
      TOOL_SERVER_VAULT_TOKEN: root
      TOOL_SERVER_REQUIRE_TOKEN_LOOKUP: "true"
      TOOL_SERVER_ENFORCE_TOKEN_IDENTITY_BINDING: "true"
      TOOL_SERVER_ALLOW_HEADER_IDENTITY_FALLBACK: "false"
      TOOL_SERVER_ALLOW_ROOT_TOKEN_FALLBACK: "false"
      TOOL_SERVER_SPAWN_MAX_DEPTH: "2"
      TOOL_SERVER_FETCH_PROXY_URL: http://nginx:8088
      TOOL_SERVER_FETCH_REQUIRE_PROXY: "true"
      TOOL_SERVER_AUDIT_INGEST_TOKEN: local-audit-ingest-token
    depends_on:
      - valkey
      - beeai-runtime
      - vault
      - otel-collector
      - nginx
    ports:
      - "8080:8080"
    networks:
      - agent-net
      - data-net

networks:
  agent-net:
    driver: bridge
  data-net:
    driver: bridge

volumes:
  vault-audit-logs:
