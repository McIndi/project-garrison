name: Phase 7 Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.1"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform modules

      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Verify container tooling
        run: |
          docker --version
          docker compose version

      - name: Run Phase 7 smoke flow
        env:
          PYTHON_CMD: python
          CI_INSTALL_DEPS: "true"
          GARRISON_TERRAFORM: "true"
          GARRISON_TERRAFORM_CONTAINER: "true"
        run: bash scripts/ci-smoke.sh
