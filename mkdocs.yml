site_name: Project Garrison Documentation
site_description: Auditable, policy-driven agent runtime for regulated workloads
site_url: https://mcindi.github.io/project-garrison/
repo_url: https://github.com/mcindi/project-garrison
repo_name: ProjectGarrison

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Request Flow: request-flow.md
  - API Reference: api.md
  - Operations: operations.md
  - Auth Hardening Plan: auth-hardening-plan.md
  - IaC and Phase 7: iac.md
  - Security Assessment 001: Security-Assessment-Pass-001.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
