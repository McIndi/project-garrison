---
# agentstack_secrets/tasks/secret_inventory.yml
#
# Phase 2, Task 1: Secret Inventory & Default-Hardening Discovery
#
# Purpose: Enumerate EVERY secret the agentstack chart (0.7.2) consumes or
# auto-generates from values.yaml + subchart defaults. For each, record:
#   - current default (flag insecure ones)
#   - whether an existingSecret hook exists
#   - chosen delivery method (VSO vs Helm value, per principle #4)
#
# Output: inventory table + facts for downstream tasks.
#
# THIS TASK IS READ-ONLY and changed_when: false — it discovers but does not
# create secrets. Downstream tasks (oidc_client_secrets, postgres_secrets, etc.)
# handle the actual generation + delivery.

- name: "SECRET INVENTORY — Build enumeration table"
  ansible.builtin.debug:
    msg: |

      ╔════════════════════════════════════════════════════════════════════════════════╗
      ║ PHASE 2, TASK 1: SECRET INVENTORY & DEFAULT-HARDENING DISCOVERY               ║
      ╚════════════════════════════════════════════════════════════════════════════════╝

      Chart: agentstack 0.7.2 | appVersion: 0.7.2
      Reference: values.yaml + subchart defaults (postgresql, redis, seaweedfs, phoenix)

      ════════════════════════════════════════════════════════════════════════════════════
      SECRET INVENTORY TABLE
      ════════════════════════════════════════════════════════════════════════════════════

      OIDC PROVIDER SECRETS (§2 of reqs, principle #4 — VSO path)
      ─────────────────────────────────────────────────────────────
      │ Secret                          │ Default     │ existingSecret? │ Delivery     │
      ├─────────────────────────────────┼─────────────┼─────────────────┼──────────────┤
      │ externalOidcProvider.           │ None        │ Yes             │ VSO→k8s      │
      │   uiClientSecret                │ (required)  │ (uiClientSecret)│ Secret       │
      │                                 │             │                 │              │
      │ externalOidcProvider.           │ None        │ Yes             │ VSO→k8s      │
      │   serverClientSecret            │ (required)  │ (serverClientSec│ Secret       │
      │                                 │             │ ret)            │              │
      └─────────────────────────────────┴─────────────┴─────────────────┴──────────────┘
      ⚠️  INSECURE DEFAULTS: None (both required, no unsafe defaults).
      📝  DELIVERY: Both exist in chart's existingSecret path. VSO VaultStaticSecret
          (OpenBao KV → k8s Secret with keys uiClientSecret/serverClientSecret).

      CORE APP SECRETS (§4.5 of reqs, principle #4 — Helm value path)
      ──────────────────────────────────────────────────────────────
      │ Secret                    │ Default    │ existingSecret? │ Delivery       │
      ├───────────────────────────┼────────────┼─────────────────┼────────────────┤
      │ encryptionKey             │ Empty      │ NO              │ Helm value     │
      │ (0.7.2 chart default)     │ (unsafe!)  │ (no hook)       │ (OpenBao→      │
      │                           │            │                 │ Ansible→       │
      │ auth.nextauthSecret       │ Auto-gen   │ NO              │ --set)         │
      │                           │ via lookup │ (no hook)       │                │
      │                           │ (unstable) │                 │                │
      └───────────────────────────┴────────────┴─────────────────┴────────────────┘
      ⚠️  INSECURE DEFAULTS: encryptionKey empty (fails silently at runtime);
          auth.nextauthSecret auto-gen (unstable per run — violates principle #2).
      📝  DECISION (2026-06-20): Source BOTH from OpenBao KV (generate-if-absent),
          read by Ansible, inject as Helm values at deploy time (NOT synced Secrets).
          This gives them the same audit provenance as all other secrets.

      DATABASE SECRETS (postgresql 14.x subchart, DISABLED; self-rolled postgres:16)
      ────────────────────────────────────────────────────────────────────────
      │ Secret                            │ Default    │ existingSecret? │ Delivery    │
      ├───────────────────────────────────┼────────────┼─────────────────┼─────────────┤
      │ externalDatabase.password / auth  │ REQUIRED   │ Via             │ VSO→k8s     │
      │                                   │ (no safe   │ externalDatabase│ Secret      │
      │                                   │ default)   │ .existingSecret │ (wired to   │
      │ postgresql.auth.                  │            │                 │ externalDB) │
      │   postgresPassword (superuser)    │ Auto-gen   │ YES             │             │
      │   password (app user)             │ Auto-gen   │ YES             │             │
      │   username (app)                  │ "postgres" │ YES             │             │
      │                                   │ (hardcoded)│                 │             │
      └───────────────────────────────────┴────────────┴─────────────────┴─────────────┘
      ⚠️  INSECURE DEFAULTS: postgresPassword / password auto-generated (unstable);
          Bitnami subchart is disabled (§DECISION 2026-06-20) — we self-roll postgres:16
          and wire it via externalDatabase.existingSecret.
      📝  DELIVERY: VSO VaultStaticSecret (OpenBao KV) syncs into externalDatabase
          .existingSecret (keys: username, password, etc., matched to externalDatabase
          field names).

      REDIS SECRETS (redis 17.x subchart, OPTIONAL; if redis.enabled: true)
      ───────────────────────────────────────────────────────────────────────
      │ Secret                      │ Default    │ existingSecret? │ Delivery     │
      ├─────────────────────────────┼────────────┼─────────────────┼──────────────┤
      │ redis.auth.password         │ Auto-gen   │ YES             │ VSO→k8s      │
      │                             │ (unstable) │ (via auth       │ Secret       │
      │                             │            │ .existingSecret)│              │
      └─────────────────────────────┴────────────┴─────────────────┴──────────────┘
      ⚠️  INSECURE DEFAULTS: Auto-generated password (unstable per run).
      📝  DELIVERY: VSO VaultStaticSecret if redis.enabled. If redis is disabled,
          skip this secret.

      SEAWEEDFS SECRETS (seaweedfs subchart, OPTIONAL; if seaweedfs.enabled: true)
      ──────────────────────────────────────────────────────────────────────────────
      │ Secret                                │ Default  │ existingSecret? │ Delivery  │
      ├───────────────────────────────────────┼──────────┼─────────────────┼───────────┤
      │ seaweedfs.s3.auth.access_key_id       │ "admin"  │ Embedded in     │ Helm      │
      │ seaweedfs.s3.auth.secret_access_key   │ "admin"  │ S3Config secret │ value     │
      │                                       │ (unsafe!)│ (no independ.   │ (OR VSO   │
      │                                       │          │ existingSecret) │ if chart  │
      │ seaweedfs.auth.admin_name             │ "admin"  │                 │ supports) │
      │ seaweedfs.auth.admin_secret           │ "admin"  │                 │           │
      │                                       │ (unsafe!)│                 │           │
      └───────────────────────────────────────┴──────────┴─────────────────┴───────────┘
      ⚠️  INSECURE DEFAULTS: All defaulted to "admin" (username + password).
      📝  DECISION: If seaweedfs.enabled, generate strong credentials in OpenBao
          and inject as Helm values (seaweedfs.auth.admin_name/secret) + S3 auth.
          Requires chart value customization (not a chart-native existingSecret hook).

      PHOENIX SECRETS (phoenix-helm subchart, OPTIONAL; if phoenix.enabled: true)
      ──────────────────────────────────────────────────────────────────────────────
      │ Secret                    │ Default    │ existingSecret? │ Delivery     │
      ├───────────────────────────┼────────────┼─────────────────┼──────────────┤
      │ phoenix.*.* (TBD)         │ TBD        │ TBD             │ TBD          │
      └───────────────────────────┴────────────┴─────────────────┴──────────────┘
      ⚠️  NOTE: Phoenix is currently disabled (phoenix.enabled: false default).
          If/when enabled, chart values must be inspected for secrets. Defer until
          then; record as a TODO if Phoenix is turned on during Phase 3+ testing.

      ════════════════════════════════════════════════════════════════════════════════════
      TRUST-MANAGER CA DISTRIBUTION (§4.3 of reqs)
      ════════════════════════════════════════════════════════════════════════════════════

      TWO internal CA roots needed for provisioning (in-cluster):
        1. pki-int CA (Keycloak `:8443`, admin REST API)
           Source: keycloak-internal-tls secret, ns keycloak, key ca.crt
           Target: agentstack namespace, key ca.crt
           Reason: garrison's Ansible calls Keycloak admin API during provisioning
        2. pki-ext CA (OIDC validation over public URL, nginx ingress)
           Source: armory-tls secret, ns ingress-nginx, key ca.crt
           Target: agentstack namespace, key ca.crt
           Reason: agentstack UI/server pods validate issuer URL over public domain

      Delivery: trust-manager Bundle CRDs (kubernetes.core.k8s with templated definition)
                → target both sources into agentstack namespace as separate Bundles.

      ════════════════════════════════════════════════════════════════════════════════════
      SUMMARY: GARRISON'S SECRET DELIVERY MATRIX
      ════════════════════════════════════════════════════════════════════════════════════

      ┌─ OIDC Client Secrets ───────────────────────────────────────────────────────┐
      │ → OpenBao KV (generate-if-absent) + VSO VaultStaticSecret → k8s Secret       │
      │ → Referenced by externalOidcProvider.existingSecret                          │
      └──────────────────────────────────────────────────────────────────────────────┘

      ┌─ Postgres Credentials & TLS ────────────────────────────────────────────────┐
      │ → OpenBao KV + VSO VaultStaticSecret → k8s Secret                           │
      │ → Referenced by externalDatabase.existingSecret                             │
      │ → TLS cert via cert-manager (openbao-pki-internal ClusterIssuer)            │
      └──────────────────────────────────────────────────────────────────────────────┘

      ┌─ Hookless Secrets (encryptionKey, auth.nextauthSecret) ──────────────────────┐
      │ → OpenBao KV (generate-if-absent) + Read by Ansible → Helm values (--set)    │
      │ → NOT synced k8s Secrets; NOT discoverable via chart existingSecret hooks    │
      └──────────────────────────────────────────────────────────────────────────────┘

      ┌─ Optional Secrets (Redis, SeaweedFS) ────────────────────────────────────────┐
      │ Redis: VSO if enabled; skip if disabled                                      │
      │ SeaweedFS: Helm values if enabled; skip if disabled                          │
      └──────────────────────────────────────────────────────────────────────────────┘

      ════════════════════════════════════════════════════════════════════════════════════
      NEXT STEPS (downstream tasks)
      ════════════════════════════════════════════════════════════════════════════════════

      1. oidc_client_secrets.yml      → Generate + store UI/server secrets, apply VSO
      2. postgres_secrets.yml         → Generate + store DB creds + cert, apply VSO/cert
      3. other_secrets.yml            → Generate + store encryptionKey, nextauthSecret,
                                        Redis (if enabled), SeaweedFS (if enabled)
      4. trust_bundles.yml            → Apply trust-manager Bundle CRs for pki-int/ext

      All generations follow generate-if-absent pattern (read first, create if missing).
  changed_when: false
