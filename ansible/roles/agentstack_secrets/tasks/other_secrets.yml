---
# agentstack_secrets/tasks/other_secrets.yml
#
# Phase 2, Task 3: Other Secrets (No existingSecret Hook)
#
# Provisions secrets that have NO existingSecret hook in the chart (§4.5 of reqs):
#   1. encryptionKey (required, unsafe default of empty)
#   2. auth.nextauthSecret (optional, but sourced from OpenBao for audit)
#   3. Redis auth (optional, if redis.enabled: true)
#   4. SeaweedFS credentials (optional, if seaweedfs.enabled: true)
#
# For hookless secrets (encryptionKey, auth.nextauthSecret): generate in OpenBao,
# read by Ansible, store in facts for later Helm --set injection (Phase 3).
# For Redis/SeaweedFS: VSO VaultStaticSecret if enabled, else skip.

# ── encryptionKey (REQUIRED) ────────────────────────────────────────────────

- name: "Read encryptionKey from OpenBao (generate-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_encryption_key_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _encryption_key_read
  changed_when: false
  no_log: true

- name: "Generate encryptionKey (if not in OpenBao)"
  ansible.builtin.set_fact:
    _encryption_key_b64: "{{ (lookup('password', '/dev/null chars=ascii_letters,digits,.-_~:/?#[]@!$&''()*+,;= length=' + agentstack_encryption_key_length | string) | b64encode) }}"
  when: _encryption_key_read.status == 404
  no_log: true

- name: "Use existing encryptionKey from OpenBao"
  ansible.builtin.set_fact:
    _encryption_key_b64: "{{ _encryption_key_read.json.data.data.encryption_key }}"
  when: _encryption_key_read.status == 200
  no_log: true

- name: "Write encryptionKey to OpenBao KV (create-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_encryption_key_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        encryption_key: "{{ _encryption_key_b64 }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _encryption_key_written
  changed_when: _encryption_key_read.status == 404
  no_log: true

- name: "Store encryptionKey as fact for Helm injection (Phase 3)"
  ansible.builtin.set_fact:
    agentstack_helm_encryption_key: "{{ _encryption_key_b64 }}"
    cacheable: yes
  no_log: true

# ── auth.nextauthSecret (OPTIONAL but sourced from OpenBao) ─────────────────

- name: "Read auth.nextauthSecret from OpenBao (generate-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_nextauth_secret_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _nextauth_secret_read
  changed_when: false
  no_log: true

- name: "Generate auth.nextauthSecret (if not in OpenBao)"
  ansible.builtin.set_fact:
    _nextauth_secret_value: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,.-_~:/?#[]@!$&''()*+,;= length=' + agentstack_nextauth_secret_length | string) }}"
  when: _nextauth_secret_read.status == 404
  no_log: true

- name: "Use existing auth.nextauthSecret from OpenBao"
  ansible.builtin.set_fact:
    _nextauth_secret_value: "{{ _nextauth_secret_read.json.data.data.nextauth_secret }}"
  when: _nextauth_secret_read.status == 200
  no_log: true

- name: "Write auth.nextauthSecret to OpenBao KV (create-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_nextauth_secret_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        nextauth_secret: "{{ _nextauth_secret_value }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _nextauth_secret_written
  changed_when: _nextauth_secret_read.status == 404
  no_log: true

- name: "Store auth.nextauthSecret as fact for Helm injection (Phase 3)"
  ansible.builtin.set_fact:
    agentstack_helm_nextauth_secret: "{{ _nextauth_secret_value }}"
    cacheable: yes
  no_log: true

# ── Redis credentials (OPTIONAL) ────────────────────────────────────────────
# Only generate if redis.enabled is true in chart values.

- name: "Read Redis auth from OpenBao (generate-if-absent, conditional on redis.enabled)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_redis_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _redis_creds_read
  changed_when: false
  no_log: true
  # Note: redis.enabled check would go here in Phase 3 (Helm values discovery)
  # For now, always attempt to generate and store; skip VSO sync if not needed.

- name: "Generate Redis password (if not in OpenBao)"
  ansible.builtin.set_fact:
    _redis_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,.-_ length=32') }}"
  when: _redis_creds_read.status == 404
  no_log: true

- name: "Use existing Redis password from OpenBao"
  ansible.builtin.set_fact:
    _redis_password: "{{ _redis_creds_read.json.data.data.password }}"
  when: _redis_creds_read.status == 200
  no_log: true

- name: "Write Redis credentials to OpenBao KV (create-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_redis_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        password: "{{ _redis_password }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _redis_creds_written
  changed_when: _redis_creds_read.status == 404
  no_log: true

# ── SeaweedFS credentials (OPTIONAL) ────────────────────────────────────────

- name: "Read SeaweedFS credentials from OpenBao (generate-if-absent, conditional on seaweedfs.enabled)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_seaweedfs_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _seaweedfs_creds_read
  changed_when: false
  no_log: true

- name: "Generate SeaweedFS credentials (if not in OpenBao)"
  ansible.builtin.set_fact:
    _seaweedfs_admin_name: "seaweedfs-admin"
    _seaweedfs_admin_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,.-_ length=32') }}"
    _seaweedfs_s3_access_key_id: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=16') }}"
    _seaweedfs_s3_secret_access_key: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,.-_~:/?#[]@!$&''()*+,;= length=32') }}"
  when: _seaweedfs_creds_read.status == 404
  no_log: true

- name: "Use existing SeaweedFS credentials from OpenBao"
  ansible.builtin.set_fact:
    _seaweedfs_admin_name: "{{ _seaweedfs_creds_read.json.data.data.admin_name }}"
    _seaweedfs_admin_password: "{{ _seaweedfs_creds_read.json.data.data.admin_password }}"
    _seaweedfs_s3_access_key_id: "{{ _seaweedfs_creds_read.json.data.data.s3_access_key_id }}"
    _seaweedfs_s3_secret_access_key: "{{ _seaweedfs_creds_read.json.data.data.s3_secret_access_key }}"
  when: _seaweedfs_creds_read.status == 200
  no_log: true

- name: "Write SeaweedFS credentials to OpenBao KV (create-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_seaweedfs_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        admin_name: "{{ _seaweedfs_admin_name }}"
        admin_password: "{{ _seaweedfs_admin_password }}"
        s3_access_key_id: "{{ _seaweedfs_s3_access_key_id }}"
        s3_secret_access_key: "{{ _seaweedfs_s3_secret_access_key }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _seaweedfs_creds_written
  changed_when: _seaweedfs_creds_read.status == 404
  no_log: true

# ── Store SeaweedFS credentials as facts for Phase 3 Helm injection ────────

- name: "Store SeaweedFS credentials as facts for Helm injection (Phase 3)"
  ansible.builtin.set_fact:
    agentstack_helm_seaweedfs_admin_name: "{{ _seaweedfs_admin_name }}"
    agentstack_helm_seaweedfs_admin_password: "{{ _seaweedfs_admin_password }}"
    agentstack_helm_seaweedfs_s3_access_key_id: "{{ _seaweedfs_s3_access_key_id }}"
    agentstack_helm_seaweedfs_s3_secret_access_key: "{{ _seaweedfs_s3_secret_access_key }}"
    cacheable: yes
  no_log: true

# ── Summary ────────────────────────────────────────────────────────────────

- name: "Display secret generation summary"
  ansible.builtin.debug:
    msg: |

      ╔════════════════════════════════════════════════════════════════════════════╗
      ║ PHASE 2, TASK 3: OTHER SECRETS — SUMMARY                                  ║
      ╚════════════════════════════════════════════════════════════════════════════╝

      ✓ encryptionKey          — Generated/read from OpenBao, ready for Helm --set
      ✓ auth.nextauthSecret    — Generated/read from OpenBao, ready for Helm --set
      ✓ Redis password         — Generated/read from OpenBao (conditional on redis.enabled)
      ✓ SeaweedFS credentials  — Generated/read from OpenBao (conditional on seaweedfs.enabled)

      All secrets stored in OpenBao KV at:
        - {{ agentstack_encryption_key_openbao_path }}
        - {{ agentstack_nextauth_secret_openbao_path }}
        - {{ agentstack_redis_openbao_path }}
        - {{ agentstack_seaweedfs_openbao_path }}

      Facts cached for Phase 3 Helm injection:
        - agentstack_helm_encryption_key
        - agentstack_helm_nextauth_secret
        - agentstack_helm_seaweedfs_admin_name (+ 3 more SeaweedFS vars)

      NOTE: Redis + SeaweedFS VSO VaultStaticSecret resources are NOT created here
            (those are hooked secrets in the chart). These credentials are stored for
            potential future Helm value injection if needed, or for manual Secret
            creation in Phase 3 if the chart exposes existingSecret hooks.
  changed_when: false
