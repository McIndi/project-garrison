---
# agentstack_secrets/tasks/oidc_client_secrets.yml
#
# Phase 2, Task 2: OIDC client secrets (UI + Server).
#
# Generate-if-absent BOTH client secrets into a SINGLE OpenBao KV entry with the
# two keys the chart's externalOidcProvider.existingSecret expects
# (uiClientSecret / serverClientSecret), set those same secrets on the Keycloak
# clients (preserving the Phase 1 client representation), then sync the KV entry
# into a k8s Secret via a VaultStaticSecret.
#
# Prerequisites (from main.yml, run earlier): agentstack namespace + VSO SA exist;
# the OpenBao CA Bundle has synced into the namespace; openbao_provisioner_token
# fact set by openbao_bootstrap; agentstack realm + clients exist (Phase 1).

# ── Generate-if-absent: both client secrets in one KV entry ───────────────────

- name: "Read OIDC client secrets from OpenBao (generate-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_oidc_secrets_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _oidc_secrets_read
  changed_when: false
  no_log: true

- name: "Generate OIDC client secrets (if absent)"
  ansible.builtin.set_fact:
    _ui_client_secret_value: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=40') }}"
    _server_client_secret_value: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=40') }}"
  when: _oidc_secrets_read.status == 404
  no_log: true

- name: "Use existing OIDC client secrets from OpenBao"
  ansible.builtin.set_fact:
    _ui_client_secret_value: "{{ _oidc_secrets_read.json.data.data[agentstack_ui_client_secret_key] }}"
    _server_client_secret_value: "{{ _oidc_secrets_read.json.data.data[agentstack_server_client_secret_key] }}"
  when: _oidc_secrets_read.status == 200
  no_log: true

- name: "Write OIDC client secrets to OpenBao KV (only if absent — stable across runs)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_oidc_secrets_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    # Build the data dict inside one Jinja expression so the *keys* (variables)
    # are resolved — Ansible does not template dict keys written as task args.
    body:
      data: "{{ {agentstack_ui_client_secret_key: _ui_client_secret_value, agentstack_server_client_secret_key: _server_client_secret_value} }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  when: _oidc_secrets_read.status == 404
  changed_when: _oidc_secrets_read.status == 404
  no_log: true

# ── Set the secrets on the Keycloak clients (uri + ca_path; modules ignore the
#    internal CA). PUT the FULL client representation with .secret merged in, so
#    the Phase 1 config (redirectUris, flows, default scopes) is preserved. ─────

- name: "Get admin token for Keycloak REST API"
  ansible.builtin.uri:
    url: "{{ keycloak_addr }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      client_id: admin-cli
      grant_type: password
      username: "{{ keycloak_admin_user }}"
      password: "{{ keycloak_admin_password }}"
    validate_certs: "{{ keycloak_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _admin_token_response
  changed_when: false
  no_log: true

- name: "List agentstack realm clients"
  ansible.builtin.uri:
    url: "{{ keycloak_addr }}/admin/realms/{{ agentstack_keycloak_realm }}/clients"
    method: GET
    headers:
      Authorization: "Bearer {{ _admin_token_response.json.access_token }}"
    validate_certs: "{{ keycloak_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _clients_list
  changed_when: false
  no_log: true

- name: "Resolve client UUIDs + current representations"
  ansible.builtin.set_fact:
    _ui_client_obj: "{{ (_clients_list.json | selectattr('clientId', 'equalto', agentstack_ui_client_id) | list | first) }}"
    _server_client_obj: "{{ (_clients_list.json | selectattr('clientId', 'equalto', agentstack_server_client_id) | list | first) }}"
  no_log: true

- name: "Set agentstack-ui client secret (full-representation PUT)"
  ansible.builtin.uri:
    url: "{{ keycloak_addr }}/admin/realms/{{ agentstack_keycloak_realm }}/clients/{{ _ui_client_obj.id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _admin_token_response.json.access_token }}"
    body_format: json
    body: "{{ _ui_client_obj | combine({'secret': _ui_client_secret_value}) }}"
    status_code: [204]
    validate_certs: "{{ keycloak_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  changed_when: true
  no_log: true

- name: "Set agentstack-server client secret (full-representation PUT)"
  ansible.builtin.uri:
    url: "{{ keycloak_addr }}/admin/realms/{{ agentstack_keycloak_realm }}/clients/{{ _server_client_obj.id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ _admin_token_response.json.access_token }}"
    body_format: json
    body: "{{ _server_client_obj | combine({'secret': _server_client_secret_value}) }}"
    status_code: [204]
    validate_certs: "{{ keycloak_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  changed_when: true
  no_log: true

# ── VSO resources: VaultConnection, VaultAuth, VaultStaticSecret ──────────────

- name: "Apply VaultConnection for agentstack"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'vaultconnection.yaml.j2') | from_yaml }}"
    state: present

- name: "Apply VaultAuth for agentstack"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'vaultauth.yaml.j2') | from_yaml }}"
    state: present

- name: "Apply VaultStaticSecret for OIDC client secrets"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'vaultstaticsecret_oidc_clients.yaml.j2') | from_yaml }}"
    state: present

# Force an immediate re-read so a freshly-written KV version isn't masked by VSO's
# refreshAfter interval (see postgres_secrets.yml for the rationale).
- name: "Force VSO to re-sync OIDC client secrets from OpenBao now"
  kubernetes.core.k8s:
    state: patched
    api_version: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    name: "{{ agentstack_client_secrets_vso_name }}"
    namespace: "{{ agentstack_namespace }}"
    definition:
      metadata:
        annotations:
          vso.hashicorp.com/force-sync: "{{ ansible_facts['date_time'].iso8601_micro }}"

# ── Wait for VSO to sync the k8s Secret ──────────────────────────────────────

- name: "Wait for OIDC client secrets Secret to be synced by VSO"
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ agentstack_client_secrets_secret_name }}"
    namespace: "{{ agentstack_namespace }}"
  register: _oidc_secret_synced
  until:
    - _oidc_secret_synced.resources | length > 0
    - _oidc_secret_synced.resources[0].data is defined
    - agentstack_ui_client_secret_key in (_oidc_secret_synced.resources[0].data | default({}))
    - agentstack_server_client_secret_key in (_oidc_secret_synced.resources[0].data | default({}))
  retries: 30
  delay: 2

- name: "Verify OIDC client secrets Secret has both required keys"
  ansible.builtin.assert:
    that:
      - agentstack_ui_client_secret_key in _oidc_secret_synced.resources[0].data
      - agentstack_server_client_secret_key in _oidc_secret_synced.resources[0].data
    fail_msg: |
      OIDC client secrets Secret missing required keys.
      Expected: {{ [agentstack_ui_client_secret_key, agentstack_server_client_secret_key] }}
      Got: {{ _oidc_secret_synced.resources[0].data.keys() | list }}
