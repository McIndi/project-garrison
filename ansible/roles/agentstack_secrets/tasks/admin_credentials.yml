---
# agentstack_secrets/tasks/admin_credentials.yml
#
# Surface the seed-admin login credentials as a k8s Secret via VSO.
#
# The KV entry ({{ agentstack_admin_creds_openbao_path }}, keys username+password)
# is written in Phase 1 (agentstack_keycloak/roles_and_users.yml), which runs
# before this role in site.yml — so it exists by the time VSO syncs it here.
# This role does NOT generate the password; OpenBao remains the source of truth.

- name: "Apply VaultStaticSecret for seed-admin credentials"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'vaultstaticsecret_admin.yaml.j2') | from_yaml }}"
    state: present

# Force an immediate re-read so a freshly-written KV version isn't masked by VSO's
# refreshAfter interval (see postgres_secrets.yml for the rationale).
- name: "Force VSO to re-sync seed-admin credentials from OpenBao now"
  kubernetes.core.k8s:
    state: patched
    api_version: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    name: "{{ agentstack_admin_creds_vso_name }}"
    namespace: "{{ agentstack_namespace }}"
    definition:
      metadata:
        annotations:
          vso.hashicorp.com/force-sync: "{{ ansible_facts['date_time'].iso8601_micro }}"

- name: "Wait for seed-admin credentials Secret to be synced by VSO"
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ agentstack_admin_creds_secret_name }}"
    namespace: "{{ agentstack_namespace }}"
  register: _admin_creds_synced
  until:
    - _admin_creds_synced.resources | length > 0
    - _admin_creds_synced.resources[0].data is defined
    - "'username' in _admin_creds_synced.resources[0].data"
    - "'password' in _admin_creds_synced.resources[0].data"
  retries: 30
  delay: 2

- name: "Report seed-admin credentials Secret"
  ansible.builtin.debug:
    msg: >-
      Seed-admin login credentials synced to Secret
      {{ agentstack_admin_creds_secret_name }} in {{ agentstack_namespace }}
      (keys: username, password). Retrieve with:
      kubectl get secret {{ agentstack_admin_creds_secret_name }}
      -n {{ agentstack_namespace }} -o jsonpath='{.data.password}' | base64 -d
