---
# agentstack_secrets/tasks/postgres_secrets.yml
#
# Phase 2, Task 5: Postgres DB Secrets + TLS Certificate
#
# Provisions:
#   1. Postgres DB credentials (username, password) → OpenBao KV
#   2. VSO VaultStaticSecret → k8s Secret (for externalDatabase.existingSecret)
#   3. cert-manager Certificate (pki-int TLS) for DB service FQDN
#
# The self-rolled postgres:16 StatefulSet (created in Phase 3, agentstack_db role)
# will use these secrets + TLS cert.

# ── Generate Postgres Credentials (generate-if-absent in OpenBao) ──────────

- name: "Read Postgres credentials from OpenBao (generate-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_db_openbao_path }}"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    status_code: [200, 404]
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _db_creds_read
  changed_when: false
  no_log: true

- name: "Generate Postgres password (if not in OpenBao)"
  ansible.builtin.set_fact:
    _db_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits,.-_ length=32') }}"
  when: _db_creds_read.status == 404
  no_log: true

- name: "Use existing Postgres password from OpenBao"
  ansible.builtin.set_fact:
    _db_password: "{{ _db_creds_read.json.data.data.password }}"
  when: _db_creds_read.status == 200
  no_log: true

- name: "Write Postgres credentials to OpenBao KV (create-if-absent)"
  ansible.builtin.uri:
    url: "{{ openbao_addr }}/v1/{{ openbao_kv_mount }}/data/{{ agentstack_db_openbao_path }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_provisioner_token }}"
    body_format: json
    body:
      data:
        username: "{{ agentstack_db_username }}"
        password: "{{ _db_password }}"
        postgres: "postgres"  # superuser password (if different, set it here)
        # Full SQLAlchemy/asyncpg URL the agentstack chart reads as
        # PERSISTENCE__DB_URL (externalDatabase.existingSecret → key
        # `sqlConnection`). The chart IGNORES host/user/password when
        # existingSecret is set, so the URL must be pre-built here. Format
        # verified against `helm template` of agentstack 0.7.1. SSL is driven
        # separately by externalDatabase.ssl → PERSISTENCE__DB_USE_SSL.
        sqlConnection: "postgresql+asyncpg://{{ agentstack_db_username }}:{{ _db_password }}@{{ agentstack_db_sql_host }}:{{ agentstack_db_sql_port }}/{{ agentstack_db_sql_name }}"
        # Superuser URL the chart's create-pgvector-extension init container reads
        # (key `sqlConnectionSuperuser`). In our self-rolled DB POSTGRES_USER
        # (agentstack) IS a superuser, so this equals sqlConnection — there is no
        # separate postgres-superuser login like the Bitnami subchart assumes.
        sqlConnectionSuperuser: "postgresql+asyncpg://{{ agentstack_db_username }}:{{ _db_password }}@{{ agentstack_db_sql_host }}:{{ agentstack_db_sql_port }}/{{ agentstack_db_sql_name }}"
    validate_certs: "{{ openbao_tls_verify }}"
    ca_path: "{{ internal_ca_bundle_path }}"
  register: _db_creds_written
  changed_when: _db_creds_read.status == 404
  no_log: true

# ── Apply VSO VaultStaticSecret for Postgres ────────────────────────────────

- name: "Apply VaultStaticSecret for Postgres credentials"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'vaultstaticsecret_postgres.yaml.j2') | from_yaml }}"
    state: present

# VSO only re-reads OpenBao on its refreshAfter schedule (1h). When this run just
# wrote a new KV version (e.g. added a key), VSO would keep serving the stale
# version far longer than the wait below. Force an immediate re-read.
- name: "Force VSO to re-sync Postgres credentials from OpenBao now"
  kubernetes.core.k8s:
    state: patched
    api_version: secrets.hashicorp.com/v1beta1
    kind: VaultStaticSecret
    name: "{{ agentstack_db_vso_name }}"
    namespace: "{{ agentstack_namespace }}"
    definition:
      metadata:
        annotations:
          vso.hashicorp.com/force-sync: "{{ ansible_facts['date_time'].iso8601_micro }}"

# ── Wait for VSO sync ──────────────────────────────────────────────────────

- name: "Wait for Postgres credentials Secret to be synced by VSO"
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ agentstack_db_secret_name }}"
    namespace: "{{ agentstack_namespace }}"
  register: _db_secret_synced
  # Wait for the sqlConnection key too — on an in-place re-run VSO needs a refresh
  # cycle to pick up the newly-written KV key before Phase 3 reads it.
  until:
    - _db_secret_synced.resources | length > 0
    - _db_secret_synced.resources[0].data is defined
    - "'sqlConnection' in _db_secret_synced.resources[0].data"
    - "'sqlConnectionSuperuser' in _db_secret_synced.resources[0].data"
  retries: 30
  delay: 2

- name: "Verify Postgres credentials Secret has required keys"
  ansible.builtin.assert:
    that:
      - "'username' in _db_secret_synced.resources[0].data"
      - "'password' in _db_secret_synced.resources[0].data"
      - "'sqlConnection' in _db_secret_synced.resources[0].data"
      - "'sqlConnectionSuperuser' in _db_secret_synced.resources[0].data"
    fail_msg: |
      Postgres credentials Secret missing required keys.
      Expected: username, password, sqlConnection (PERSISTENCE__DB_URL),
      sqlConnectionSuperuser (create-pgvector-extension init container).
      Got: {{ _db_secret_synced.resources[0].data.keys() | list }}

# ── Create cert-manager Certificate for Postgres TLS ──────────────────────

- name: "Apply cert-manager Certificate for Postgres TLS (pki-int)"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'certificate_postgres_tls.yaml.j2') | from_yaml }}"
    state: present

# ── Wait for the TLS certificate to be issued ──────────────────────────────

- name: "Wait for Postgres TLS Certificate to be issued"
  kubernetes.core.k8s_info:
    kind: Certificate
    name: "{{ agentstack_db_tls_cert_name }}"
    namespace: "{{ agentstack_namespace }}"
  register: _db_cert_check
  until:
    - _db_cert_check.resources | length > 0
    - _db_cert_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | list | first | default('False') == 'True'
  retries: 30
  delay: 2
  failed_when: false

- name: "Verify Postgres TLS Certificate was issued successfully"
  ansible.builtin.assert:
    that:
      - "_db_cert_check.resources | length > 0"
      - "_db_cert_check.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | list | first | default('False') == 'True'"
    fail_msg: |
      Postgres TLS Certificate failed to issue. Check cert-manager logs for openbao-pki-internal ClusterIssuer.
      Certificate status: {{ _db_cert_check.resources[0].status | default('unknown') }}

# ── Verify the Secret backing the Certificate was created ───────────────────

- name: "Verify Postgres TLS Secret exists"
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ agentstack_db_tls_cert_name }}"
    namespace: "{{ agentstack_namespace }}"
  register: _db_tls_secret
  failed_when: _db_tls_secret.resources | length == 0
  changed_when: false
