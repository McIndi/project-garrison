---
# agentstack_keycloak/tasks/clients.yml
#
# Provision the two OIDC clients in the agentstack realm:
#
#   agentstack-ui
#     - Browser login (standard flow), confidential
#     - redirect_uris / web_origins scoped to the real UI host (not "*")
#     - default_client_scopes includes agentstack-server-audience (created in
#       client_scopes.yml) so every token issued for this client carries aud=
#       agentstack-server. The full list also includes the standard Keycloak
#       scopes required for OIDC login (email, profile, roles, web-origins).
#     - directAccessGrantsEnabled: false (ROPC disabled — DECISION 2026-06-20)
#
#   agentstack-server
#     - Service account / M2M, confidential
#     - Standard flow disabled; service accounts enabled
#     - directAccessGrantsEnabled: false (starts false; see ticket §ROPC caveat)
#     - No audience scope — it IS the audience, not a consumer of it
#
# Client secrets are NOT set here. Phase 2 (agentstack_secrets) generates them
# generate-if-absent in OpenBao and delivers them to the chart via VSO
# VaultStaticSecret. Keycloak will auto-assign a secret on first create; the
# chart uses an existingSecret reference, not Keycloak's auto-generated value.
#
# Prerequisites:
#   - Realm agentstack exists (realm.yml)
#   - agentstack-server-audience scope exists (client_scopes.yml)
#   - CA proof passed; keycloak_admin_user / keycloak_admin_password facts set

# ── agentstack-ui ─────────────────────────────────────────────────────────────

- name: Create / update agentstack-ui OIDC client
  community.general.keycloak_client:
    auth_keycloak_url: "{{ keycloak_addr }}"
    auth_realm: "{{ keycloak_auth_realm }}"
    auth_username: "{{ keycloak_admin_user }}"
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: "{{ keycloak_tls_verify }}"
    realm: "{{ agentstack_keycloak_realm }}"
    client_id: "{{ agentstack_ui_client_id }}"
    name: "AgentStack UI"
    description: "Browser-based OIDC client for the AgentStack web UI"
    enabled: true
    protocol: openid-connect
    # Confidential (not public)
    public_client: false
    # Standard authorization code flow for browser login
    standard_flow_enabled: true
    implicit_flow_enabled: false
    # ROPC disabled (DECISION 2026-06-20 / reqs §3.2 / §7):
    # Only enable if beeai CLI login proves to require it (Phase 4 test).
    direct_access_grants_enabled: false
    service_accounts_enabled: false
    # Scoped to the real UI host — never wildcard "*" (reqs §4.6)
    redirect_uris: "{{ agentstack_ui_redirect_uris }}"
    web_origins: "{{ agentstack_ui_web_origins }}"
    # Default scopes: standard OIDC scopes + audience scope so every token
    # issued for this client carries aud=agentstack-server.
    # This list is the FULL desired default-scope set; Keycloak enforces it exactly.
    default_client_scopes: "{{ agentstack_ui_default_client_scopes }}"
    state: present
  register: ui_client_result
  no_log: "{{ not (garrison_log_nolog | default(false) | bool) }}"

- name: Report agentstack-ui client provisioning outcome
  ansible.builtin.debug:
    msg: "agentstack-ui client {{ 'created' if ui_client_result.changed else 'already up-to-date' }}"

# ── agentstack-server ─────────────────────────────────────────────────────────

- name: Create / update agentstack-server OIDC client
  community.general.keycloak_client:
    auth_keycloak_url: "{{ keycloak_addr }}"
    auth_realm: "{{ keycloak_auth_realm }}"
    auth_username: "{{ keycloak_admin_user }}"
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: "{{ keycloak_tls_verify }}"
    realm: "{{ agentstack_keycloak_realm }}"
    client_id: "{{ agentstack_server_client_id }}"
    name: "AgentStack Server"
    description: "Service-account OIDC client for the AgentStack backend API"
    enabled: true
    protocol: openid-connect
    # Confidential
    public_client: false
    # M2M / service account — no browser flow
    standard_flow_enabled: false
    implicit_flow_enabled: false
    # ROPC starts false — see ticket §ROPC caveat / Phase 4 test
    direct_access_grants_enabled: false
    service_accounts_enabled: true
    state: present
  register: server_client_result
  no_log: "{{ not (garrison_log_nolog | default(false) | bool) }}"

- name: Report agentstack-server client provisioning outcome
  ansible.builtin.debug:
    msg: "agentstack-server client {{ 'created' if server_client_result.changed else 'already up-to-date' }}"

# ── agentstack-cli ──────────────────────────────────────────────────────────────
# Public PKCE client for `agentstack server login`. The CLI uses Authorization
# Code + PKCE (NOT ROPC) with a fixed loopback redirect (127.0.0.1:9001) and talks
# directly to the server's API ingress. Public client = no secret to manage;
# pkce.code.challenge.method=S256 enforces PKCE. Keycloak anonymous Dynamic Client
# Registration stays disabled — the CLI falls back to this client via
# `--client-id agentstack-cli`. See ticket 001 Phase 4.

- name: Create / update agentstack-cli OIDC client
  community.general.keycloak_client:
    auth_keycloak_url: "{{ keycloak_addr }}"
    auth_realm: "{{ keycloak_auth_realm }}"
    auth_username: "{{ keycloak_admin_user }}"
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: "{{ keycloak_tls_verify }}"
    realm: "{{ agentstack_keycloak_realm }}"
    client_id: "{{ agentstack_cli_client_id }}"
    name: "AgentStack CLI"
    description: "Public PKCE client for the agentstack CLI (Auth Code + PKCE, loopback redirect)"
    enabled: true
    protocol: openid-connect
    # Public client (no secret) — the secure pattern for native/CLI apps.
    public_client: true
    # Authorization code flow for browser-based login.
    standard_flow_enabled: true
    implicit_flow_enabled: false
    # No ROPC, no service account — Auth Code + PKCE only.
    direct_access_grants_enabled: false
    service_accounts_enabled: false
    # Fixed loopback redirect the CLI listens on; no web origins needed (native app).
    redirect_uris: "{{ agentstack_cli_redirect_uris }}"
    # Enforce PKCE (S256) — required for a public client to be secure.
    attributes:
      pkce.code.challenge.method: "S256"
    default_client_scopes: "{{ agentstack_cli_default_client_scopes }}"
    state: present
  register: cli_client_result
  no_log: "{{ not (garrison_log_nolog | default(false) | bool) }}"

- name: Report agentstack-cli client provisioning outcome
  ansible.builtin.debug:
    msg: "agentstack-cli client {{ 'created' if cli_client_result.changed else 'already up-to-date' }}"
