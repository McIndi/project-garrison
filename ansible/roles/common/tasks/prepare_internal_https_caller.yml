---
# Common task: prepare_internal_https_caller.yml
#
# Assembles a COMBINED internal CA trust bundle so garrison can validate HTTPS
# to both of armory's internal PKIs from a single bundle:
#   1. OpenBao listener CA  (CN=OpenBao-Internal-CA)  -> validates OpenBao API
#   2. cert-manager root CA (CN=Armory Root CA)       -> validates Keycloak etc.
# armory exposes no dedicated CA secret for (2); it is carried as the ca.crt key
# on a cert-manager leaf secret (keycloak-internal-tls). Both roots are written
# into one PEM file; a TLS peer is trusted if its chain anchors to either.
#
# Sets fact: internal_ca_bundle_path (path to combined CA file on disk)

- name: Derive Keycloak service host from keycloak_addr
  ansible.builtin.set_fact:
    _internal_https_keycloak_host: "{{ keycloak_addr | regex_replace('^https?://([^/:]+).*$', '\\1') }}"
  changed_when: false

- name: Derive OpenBao service host from openbao_addr
  ansible.builtin.set_fact:
    _internal_https_openbao_host: "{{ openbao_addr | regex_replace('^https?://([^/:]+).*$', '\\1') }}"
  changed_when: false

- name: Look up Keycloak Service when using in-cluster service DNS
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: "{{ _internal_https_keycloak_host | regex_replace('^([^.]+)\\..*$', '\\1') }}"
    namespace: "{{ _internal_https_keycloak_host | regex_replace('^[^.]+\\.([^.]+)\\..*$', '\\1') }}"
    kubeconfig: "{{ garrison_kubeconfig_path }}"
  register: _internal_https_keycloak_svc
  changed_when: false
  when: _internal_https_keycloak_host is match('^[^.]+\\.[^.]+\\.svc(\\.cluster\\.local)?$')

- name: Pin Keycloak service DNS to ClusterIP in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\\S+\\s+{{ _internal_https_keycloak_host | regex_escape }}(\\s|$)'
    line: "{{ _internal_https_keycloak_svc.resources[0].spec.clusterIP }} {{ _internal_https_keycloak_host }}"
    state: present
  become: true
  when:
    - _internal_https_keycloak_host is match('^[^.]+\\.[^.]+\\.svc(\\.cluster\\.local)?$')
    - (_internal_https_keycloak_svc.resources | default([]) | length) > 0
    - (_internal_https_keycloak_svc.resources[0].spec.clusterIP | default('')) not in ['', 'None']

- name: Look up OpenBao Service when using in-cluster service DNS
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: "{{ _internal_https_openbao_host | regex_replace('^([^.]+)\\..*$', '\\1') }}"
    namespace: "{{ _internal_https_openbao_host | regex_replace('^[^.]+\\.([^.]+)\\..*$', '\\1') }}"
    kubeconfig: "{{ garrison_kubeconfig_path }}"
  register: _internal_https_openbao_svc
  changed_when: false
  when: _internal_https_openbao_host is match('^[^.]+\\.[^.]+\\.svc(\\.cluster\\.local)?$')

- name: Pin OpenBao service DNS to ClusterIP in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^\\S+\\s+{{ _internal_https_openbao_host | regex_escape }}(\\s|$)'
    line: "{{ _internal_https_openbao_svc.resources[0].spec.clusterIP }} {{ _internal_https_openbao_host }}"
    state: present
  become: true
  when:
    - _internal_https_openbao_host is match('^[^.]+\\.[^.]+\\.svc(\\.cluster\\.local)?$')
    - (_internal_https_openbao_svc.resources | default([]) | length) > 0
    - (_internal_https_openbao_svc.resources[0].spec.clusterIP | default('')) not in ['', 'None']

- name: Fetch OpenBao listener CA from Kubernetes secret
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ openbao_ca_secret_name }}"
    namespace: "{{ openbao_ca_secret_namespace }}"
    kubeconfig: "{{ garrison_kubeconfig_path }}"
  register: openbao_ca_secret
  changed_when: false

- name: Fetch cert-manager root CA from Kubernetes secret
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ cert_manager_ca_secret_name }}"
    namespace: "{{ cert_manager_ca_secret_namespace }}"
    kubeconfig: "{{ garrison_kubeconfig_path }}"
  register: cert_manager_ca_secret
  changed_when: false

- name: Assert both internal CA secrets were found
  ansible.builtin.assert:
    that:
      - openbao_ca_secret.resources | length > 0
      - cert_manager_ca_secret.resources | length > 0
    fail_msg: |
      Could not read one or both internal CA secrets:
        - {{ openbao_ca_secret_namespace }}/{{ openbao_ca_secret_name }} (OpenBao listener CA)
        - {{ cert_manager_ca_secret_namespace }}/{{ cert_manager_ca_secret_name }} (cert-manager root CA)
      Ensure armory site.yml has completed and these secrets exist.

- name: Write combined internal CA trust bundle to disk
  ansible.builtin.copy:
    content: |
      {{ openbao_ca_secret.resources[0].data[openbao_ca_cert_key] | b64decode | trim }}
      {{ cert_manager_ca_secret.resources[0].data[cert_manager_ca_cert_key] | b64decode | trim }}
    dest: "{{ internal_ca_bundle_path }}"
    mode: '0644'
  changed_when: false

- name: Assert combined CA bundle exists
  ansible.builtin.stat:
    path: "{{ internal_ca_bundle_path }}"
  register: ca_bundle_stat
  changed_when: false

- name: Fail if combined CA bundle missing
  ansible.builtin.fail:
    msg: |
      Combined internal CA bundle not found at {{ internal_ca_bundle_path }}.
  when: not ca_bundle_stat.stat.exists
