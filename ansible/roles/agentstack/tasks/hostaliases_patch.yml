---
# Dual-issuer patch for the AgentStack UI + server Deployments.
#
# In external-OIDC mode the pods talk to the PUBLIC issuer
# (https://{{ agentstack_armory_domain }}/realms/agentstack), which:
#   1. only resolves at the edge gateway (not via cluster DNS), and
#   2. is served with an Armory-Root-CA (private) certificate.
# The chart provisions neither the name resolution nor the CA trust, so we patch
# both Deployments with (a) a hostAlias → ingress ClusterIP and (b) the Phase 2
# public-CA Secret mounted in-pod + NODE_EXTRA_CA_CERTS. This is armory's proven
# Headlamp/BeeAI pattern (vendored, not imported).
#
# Strategic-merge patch: containers/volumes/volumeMounts/env merge by `name`, so
# we touch only our container and add our volume/env without clobbering the rest.
# hostAliases has no merge key (whole-list replace) — we own it, so that's fine.

- name: Apply dual-issuer (hostAlias + CA trust) patch to AgentStack Deployments
  block:
    - name: Look up Envoy Gateway data-plane Service ClusterIP
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        namespace: "{{ agentstack_hostaliases_edge_gateway_namespace }}"
        label_selectors:
          - "gateway.envoyproxy.io/owning-gateway-name={{ agentstack_hostaliases_edge_gateway_name }}"
          - "gateway.envoyproxy.io/owning-gateway-namespace={{ agentstack_hostaliases_edge_gateway_namespace }}"
      register: _edge_gateway_service
      changed_when: false
      failed_when: false

    - name: Select edge gateway ClusterIP
      ansible.builtin.set_fact:
        _ingress_cluster_ip: >-
          {{
            ((_edge_gateway_service.resources | default([]) | first | default({})).spec.clusterIP | default(''))
          }}

    - name: Assert edge gateway ClusterIP was discovered
      ansible.builtin.assert:
        that:
          - (_ingress_cluster_ip | default('') | length) > 0
        fail_msg: >-
          Could not resolve edge gateway ClusterIP by labels
          gateway.envoyproxy.io/owning-gateway-name={{ agentstack_hostaliases_edge_gateway_name }},
          gateway.envoyproxy.io/owning-gateway-namespace={{ agentstack_hostaliases_edge_gateway_namespace }}.
          The dual-issuer hostAlias cannot be built without it.

    # The patch body is identical bar the container name, so build it once per
    # Deployment via a loop over (deployment, container) pairs.
    - name: Patch UI + server Deployments with hostAlias and private-CA trust
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        name: "{{ item.deployment }}"
        namespace: "{{ agentstack_namespace }}"
        definition:
          spec:
            template:
              spec:
                hostAliases:
                  - ip: "{{ _ingress_cluster_ip }}"
                    hostnames: "{{ agentstack_hostaliases_hostnames }}"
                volumes:
                  - name: agentstack-oidc-ca
                    secret:
                      secretName: "{{ agentstack_oidc_ca_secret_name }}"
                      items:
                        - key: "{{ agentstack_oidc_ca_secret_key }}"
                          path: "{{ agentstack_oidc_ca_secret_key }}"
                containers:
                  - name: "{{ item.container }}"
                    volumeMounts:
                      - name: agentstack-oidc-ca
                        mountPath: "{{ agentstack_oidc_ca_mount_path }}"
                        readOnly: true
                    env:
                      # The mounted bundle (agentstack-public-ca) contains the
                      # default/public CAs AND the Armory Root CA, so pointing at
                      # it does not break outbound TLS to public endpoints.
                      # NODE_EXTRA_CA_CERTS → the Node/Next.js UI; SSL_CERT_FILE +
                      # REQUESTS_CA_BUNDLE → the Python server (needed to fetch the
                      # OIDC issuer's JWKS over HTTPS, else token validation 401s).
                      # All three are set on both pods; each runtime ignores the
                      # ones that don't apply to it.
                      - name: NODE_EXTRA_CA_CERTS
                        value: "{{ agentstack_oidc_ca_file_path }}"
                      - name: SSL_CERT_FILE
                        value: "{{ agentstack_oidc_ca_file_path }}"
                      - name: REQUESTS_CA_BUNDLE
                        value: "{{ agentstack_oidc_ca_file_path }}"
      loop:
        - { deployment: "{{ agentstack_ui_deployment_name }}", container: "{{ agentstack_ui_container_name }}" }
        - { deployment: "{{ agentstack_server_deployment_name }}", container: "{{ agentstack_server_container_name }}" }
      loop_control:
        label: "{{ item.deployment }} ({{ item.container }})"
      register: _agentstack_dualissuer_patch

    - name: Report dual-issuer patch outcome
      ansible.builtin.debug:
        msg: >-
          Dual-issuer patch applied to {{ agentstack_ui_deployment_name }} +
          {{ agentstack_server_deployment_name }}:
          hostAlias {{ agentstack_hostaliases_hostnames | join(',') }} ->
          {{ _ingress_cluster_ip }}; CA {{ agentstack_oidc_ca_secret_name }}
          mounted at {{ agentstack_oidc_ca_file_path }}.
