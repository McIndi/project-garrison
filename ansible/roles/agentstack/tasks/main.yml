---
# AgentStack Helm release deployment (Phase 3)
# Orchestrates: Helm repo, Chart values, release deployment, hostAlias patches, ingress TLS
#
# Dependencies from earlier phases:
#   - agentstack_namespace exists (Phase 2: agentstack_secrets creates it)
#   - OIDC client secrets synced (Phase 2: agentstack_secrets VaultStaticSecret)
#   - Postgres StatefulSet running (Phase 3: agentstack_db)
#   - Postgres credentials Secret synced (Phase 2: agentstack_secrets)
#   - DB TLS cert issued (Phase 2: agentstack_secrets cert-manager Certificate)
#   - Trust bundles synced (Phase 2: agentstack_secrets trust-manager Bundles)
#   - Keycloak realm + clients provisioned (Phase 1: agentstack_keycloak)

- name: Deploy AgentStack Helm release
  block:
    # OCI chart — no helm_repository task; chart_ref is the oci:// URL directly.
    # Order matters: create (wait:false) → ingress cert → dual-issuer patch
    # (triggers rollout) → THEN gate on readiness.
    - name: Include helm_release subtask
      ansible.builtin.include_tasks: helm_release.yml

    # After the chart is applied the registry Service exists (ClusterIP assigned),
    # so we can read it and configure node-level containerd pull trust. The k3s
    # restart is deferred to a handler (flushed at play end) so it does NOT blip
    # the API mid-deploy — the mirror is only needed at `agentstack add` time.
    - name: Include node_registry_trust subtask (k3s containerd pull config)
      ansible.builtin.include_tasks: node_registry_trust.yml

    - name: Include ui_ingress subtask
      ansible.builtin.include_tasks: ui_ingress.yml

    - name: Include server_ingress subtask (API host for the CLI)
      ansible.builtin.include_tasks: server_ingress.yml

    - name: Include hostaliases_patch subtask
      ansible.builtin.include_tasks: hostaliases_patch.yml

    - name: Include readiness_check subtask
      ansible.builtin.include_tasks: readiness_check.yml
