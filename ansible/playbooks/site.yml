---
- name: Deploy Agent Stack against external armory Keycloak
  hosts: all
  gather_facts: true
  # Default kubeconfig for all kubernetes.core.* tasks that don't pass one
  # explicitly (honored via the K8S_AUTH_KUBECONFIG env var). Explicit
  # `kubeconfig:` on a task still overrides this.
  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('ansible.builtin.env', 'ARMORY_KUBECONFIG_PATH') | default('/etc/rancher/k3s/k3s.yaml', true) }}"
  roles:
    - role: preflight
      tags:
        - always
        - preflight

    - role: openbao_bootstrap
      tags:
        - always
        - openbao
        - bootstrap

    - role: agentstack_keycloak
      tags:
        - agentstack_keycloak

    - role: agentstack_secrets
      tags:
        - agentstack_secrets

    - role: agentstack_db
      tags:
        - agentstack_db
        - agentstack_deploy

    - role: agentstack
      tags:
        - agentstack
        - agentstack_deploy
