---
# Teardown playbook — garrison's analog of armory's teardown_k3s_workloads.yml
#
# Gated by -e teardown_confirm=true to prevent accidental destruction.
# Destroys all garrison-managed state:
#   - Helm release (agentstack)
#   - Kubernetes namespace (agentstack)
#   - Keycloak realm (agentstack)
#   - OpenBao KV paths (garrison's secrets)
#
# Run model: inner-loop reset (does not touch armory).
#   After teardown, `site.yml` will converge cleanly (all create-if-absent logic fires).
#
# Usage:
#   ansible-playbook playbooks/teardown.yml -e teardown_confirm=true

- name: Teardown garrison
  hosts: localhost
  gather_facts: false
  vars:
    # Hardcoded garrison defaults; override via -e if needed.
    agentstack_namespace: agentstack
    agentstack_realm: agentstack
    # OpenBao KV v2 metadata prefix for garrison secrets (derived from common
    # defaults). Purge happens via metadata/ to remove ALL versions, not data/.
    openbao_garrison_kv_path: "{{ openbao_kv_mount }}/metadata/{{ openbao_kv_prefix }}"
    # System trust-store anchor installed by agentstack_keycloak/ca_proof.yml.
    # Kept in sync with that role's agentstack_ca_trust_anchor_filename.
    garrison_ca_trust_anchor_path: /etc/pki/ca-trust/source/anchors/garrison-internal-ca.crt

  pre_tasks:
    - name: Safety gate — require explicit confirmation
      block:
        - name: Fail unless teardown_confirm is true
          assert:
            that:
              - teardown_confirm is defined
              - teardown_confirm | bool
            fail_msg: |
              Teardown requires explicit confirmation to prevent accidents.
              Re-run with:  ansible-playbook playbooks/teardown.yml -e teardown_confirm=true
      rescue:
        - name: Print safety message
          debug:
            msg: |
              ⚠️  Teardown requires -e teardown_confirm=true
              This will DESTROY:
                - Helm release 'agentstack' in {{ agentstack_namespace }}
                - Kubernetes namespace {{ agentstack_namespace }}
                - Keycloak realm {{ agentstack_realm }}
                - OpenBao KV paths under {{ openbao_garrison_kv_path }}
              Only proceed if you are sure.
          run_once: true
        - name: Exit with clear message
          fail:
            msg: Teardown cancelled (safety gate). Use -e teardown_confirm=true to override.

  tasks:
    # Use include_role (tasks_from) rather than include_tasks so the common
    # role's defaults/main.yml loads — several vendored helpers reference vars
    # defined only there (openbao_provisioner_policy_name,
    # openbao_provisioner_token_ttl, keycloak_bootstrap_admin_*). group_vars
    # still overrides wherever it defines a value (higher precedence).
    - name: Prepare internal HTTPS caller (combined internal-CA bundle for TLS validation)
      ansible.builtin.include_role:
        name: common
        tasks_from: prepare_internal_https_caller.yml

    - name: Prepare OpenBao provisioner token (read root, mint scoped token for KV cleanup)
      ansible.builtin.include_role:
        name: common
        tasks_from: prepare_openbao_provisioner_token.yml

    - name: Prepare Keycloak bootstrap admin credentials (for realm deletion)
      ansible.builtin.include_role:
        name: common
        tasks_from: prepare_keycloak_bootstrap_admin.yml

    - name: Delete Helm release
      block:
        - name: Helm uninstall agentstack
          kubernetes.core.helm:
            release_name: agentstack
            namespace: "{{ agentstack_namespace }}"
            state: absent
            kubeconfig: "{{ lookup('env', 'ARMORY_KUBECONFIG_PATH') }}"
          changed_when: true  # helm uninstall doesn't report changed accurately; be explicit

        - name: Debug — Helm release deleted
          debug:
            msg: "Helm release 'agentstack' uninstalled"
      rescue:
        - name: Warn if release not found (already deleted)
          debug:
            msg: "Note: Helm release 'agentstack' not found (may already be deleted)"

    - name: Delete Kubernetes namespace
      block:
        - name: Delete agentstack namespace
          kubernetes.core.k8s:
            name: "{{ agentstack_namespace }}"
            api_version: v1
            kind: Namespace
            state: absent
            kubeconfig: "{{ lookup('env', 'ARMORY_KUBECONFIG_PATH') }}"
            wait: true
            wait_timeout: 300

        - name: Debug — Namespace deleted
          debug:
            msg: "Namespace '{{ agentstack_namespace }}' deleted"
      rescue:
        - name: Warn if namespace not found
          debug:
            msg: "Note: Namespace '{{ agentstack_namespace }}' not found (may already be deleted)"

    - name: Delete Keycloak realm
      block:
        - name: Delete agentstack realm from Keycloak
          community.general.keycloak_realm:
            auth_client_id: admin-cli
            auth_keycloak_url: "{{ keycloak_addr }}"
            auth_realm: master
            auth_username: "{{ keycloak_admin_user }}"
            auth_password: "{{ keycloak_admin_password }}"
            realm: "{{ agentstack_realm }}"
            state: absent
            validate_certs: "{{ keycloak_tls_verify }}"
            # ca_path is the real trust mechanism here — keycloak_realm accepts it.
            # (No SSL_CERT_FILE/REQUESTS_CA_BUNDLE env fallback: open_url ignores
            # those, so it would be dead weight — verified 2026-06-22.)
            ca_path: "{{ internal_ca_bundle_path }}"
          no_log: true

        - name: Debug — Keycloak realm deleted
          debug:
            msg: "Keycloak realm '{{ agentstack_realm }}' deleted"
      rescue:
        - name: Warn if realm not found
          debug:
            msg: "Note: Keycloak realm '{{ agentstack_realm }}' not found (may already be deleted)"

    - name: Clean OpenBao KV paths (metadata purge under garrison prefix)
      block:
        - name: Purge all garrison secrets (all versions) under the KV prefix
          ansible.builtin.include_tasks: ../roles/common/tasks/purge_openbao_kv_prefix.yml
          vars:
            purge_kv_metadata_path: "{{ openbao_garrison_kv_path }}"

        - name: Debug — OpenBao KV cleaned
          debug:
            msg: "OpenBao KV prefix '{{ openbao_garrison_kv_path }}/' purged (all versions + metadata)"
      rescue:
        - name: Warn if KV purge hit an error
          debug:
            msg: "Note: OpenBao KV purge under '{{ openbao_garrison_kv_path }}/' reported an issue (may already be empty)"

    - name: Remove garrison CA from the system trust store
      block:
        - name: Remove garrison internal-CA trust anchor
          ansible.builtin.file:
            path: "{{ garrison_ca_trust_anchor_path }}"
            state: absent
          become: true
          register: garrison_ca_anchor_removed

        - name: Rebuild system CA trust store (only if the anchor was present)
          ansible.builtin.command:
            cmd: update-ca-trust extract
          become: true
          changed_when: false
          when: garrison_ca_anchor_removed.changed

        - name: Debug — system trust store cleaned
          debug:
            msg: >-
              {{ 'Garrison CA anchor removed + trust store rebuilt'
                 if garrison_ca_anchor_removed.changed
                 else 'No garrison CA anchor present (nothing to remove)' }}

  post_tasks:
    - name: Summary
      debug:
        msg: |
          ✓ Teardown complete
          Garrison state destroyed:
            - Helm release uninstalled
            - agentstack namespace deleted
            - agentstack realm removed from Keycloak
            - OpenBao KV paths cleaned
            - Garrison CA removed from system trust store
          Next: ansible-playbook playbooks/site.yml (to rebuild cleanly)
