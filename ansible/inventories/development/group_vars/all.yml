---
# Global overrides for the development inventory.

# Garrison deploys into armory's existing cluster.
garrison_kubeconfig_path: "{{ lookup('ansible.builtin.env', 'ARMORY_KUBECONFIG_PATH') | default('/etc/rancher/k3s/k3s.yaml', true) }}"

# Locked defaults from requirements/ticket.
agentstack_namespace: agentstack
agentstack_keycloak_realm: agentstack
agentstack_ui_host: "{{ lookup('ansible.builtin.env', 'AGENTSTACK_UI_HOST') | default('agentstack.' + (lookup('ansible.builtin.env', 'ARMORY_PUBLIC_DOMAIN') | default('armory.local', true)), true) }}"

# Platform dependencies expected to already exist from armory site deploy.
preflight_expected_services:
  - { namespace: keycloak, name: keycloak-service }
  - { namespace: openbao, name: openbao }
  - { namespace: ingress-nginx, name: ingress-nginx-controller }

preflight_expected_deployments:
  - { namespace: vault-secrets-operator-system, name: vault-secrets-operator-controller-manager }
  - { namespace: cert-manager, name: cert-manager }
  - { namespace: cert-manager, name: trust-manager }

preflight_fail_message: >-
  Armory platform dependencies are not fully ready. Run armory ansible/playbooks/site.yml first,
  then re-run garrison ansible/playbooks/site.yml.
