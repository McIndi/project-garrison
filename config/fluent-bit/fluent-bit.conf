[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

[INPUT]
    Name              tail
    Path              /logs/vault/audit.log
    Tag               vault.audit
    Read_from_Head    false
    Refresh_Interval  2

[INPUT]
    Name              tail
    Path              /logs/nginx/access.log
    Tag               nginx.access
    Read_from_Head    false
    Refresh_Interval  2

[OUTPUT]
    Name        http
    Match       vault.audit
    Host        tool-server
    Port        8080
    URI         /internal/audit/ingest/vault
    Format      json_lines
    Header      X-Audit-Ingest-Token ${AUDIT_INGEST_TOKEN}

[OUTPUT]
    Name        http
    Match       nginx.access
    Host        tool-server
    Port        8080
    URI         /internal/audit/ingest/nginx
    Format      json_lines
    Header      X-Audit-Ingest-Token ${AUDIT_INGEST_TOKEN}
